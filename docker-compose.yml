services:
  postgres:
    image: postgres:16-alpine
    container_name: ramofinance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ramofinance
      POSTGRES_PASSWORD: ramofinance
      POSTGRES_DB: ramofinance_alerts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ramofinance -d ramofinance_alerts"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: ramofinance-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_PORT: 3000
      DATABASE_URL: postgresql://ramofinance:ramofinance@postgres:5432/ramofinance_alerts
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-ramofinance_alerts_bot}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      WS_PORT: 4000
      PRICE_POLLING_ENABLED: ${PRICE_POLLING_ENABLED:-false}
      PRICE_POLLING_INTERVAL_MS: ${PRICE_POLLING_INTERVAL_MS:-30000}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    container_name: ramofinance-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
